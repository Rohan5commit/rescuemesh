<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="qvac" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="rag" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="900" height="600" fill="url(#bg)" rx="12"/>
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">RescueMesh Architecture</text>
  <text x="450" y="60" text-anchor="middle" fill="#94a3b8" font-size="12">Offline Field-Operations AI Copilot • QVAC Hackathon I</text>
  <!-- QVAC SDK Layer -->
  <rect x="50" y="85" width="800" height="90" rx="8" fill="url(#qvac)" opacity="0.15" stroke="url(#qvac)" stroke-width="1"/>
  <text x="60" y="105" fill="#93c5fd" font-size="11" font-weight="600">QVAC SDK LAYER</text>
  <rect x="70" y="115" width="120" height="45" rx="6" fill="#1e40af" opacity="0.6"/>
  <text x="130" y="135" text-anchor="middle" fill="#bfdbfe" font-size="10">LLM Inference</text>
  <text x="130" y="148" text-anchor="middle" fill="#93c5fd" font-size="8">loadModel + completion</text>
  <rect x="210" y="115" width="120" height="45" rx="6" fill="#1e40af" opacity="0.6"/>
  <text x="270" y="135" text-anchor="middle" fill="#bfdbfe" font-size="10">Embeddings</text>
  <text x="270" y="148" text-anchor="middle" fill="#93c5fd" font-size="8">embed (768-dim)</text>
  <rect x="350" y="115" width="120" height="45" rx="6" fill="#1e40af" opacity="0.6"/>
  <text x="410" y="135" text-anchor="middle" fill="#bfdbfe" font-size="10">Transcription</text>
  <text x="410" y="148" text-anchor="middle" fill="#93c5fd" font-size="8">transcribe (whisper)</text>
  <rect x="490" y="115" width="120" height="45" rx="6" fill="#1e40af" opacity="0.6"/>
  <text x="550" y="135" text-anchor="middle" fill="#bfdbfe" font-size="10">Image Analysis</text>
  <text x="550" y="148" text-anchor="middle" fill="#93c5fd" font-size="8">multimodal completion</text>
  <rect x="630" y="115" width="120" height="45" rx="6" fill="#1e40af" opacity="0.6"/>
  <text x="690" y="135" text-anchor="middle" fill="#bfdbfe" font-size="10">P2P Delegation</text>
  <text x="690" y="148" text-anchor="middle" fill="#93c5fd" font-size="8">delegate + fallback</text>
  <rect x="770" y="115" width="65" height="45" rx="6" fill="#1e40af" opacity="0.6"/>
  <text x="802" y="135" text-anchor="middle" fill="#bfdbfe" font-size="10">RAG</text>
  <text x="802" y="148" text-anchor="middle" fill="#93c5fd" font-size="8">ingest + search</text>
  <!-- Application Layer -->
  <rect x="50" y="200" width="800" height="120" rx="8" fill="#10b981" opacity="0.08" stroke="#10b981" stroke-width="1"/>
  <text x="60" y="220" fill="#6ee7b7" font-size="11" font-weight="600">APPLICATION LAYER</text>
  <rect x="70" y="232" width="110" height="70" rx="6" fill="#065f46" opacity="0.5"/>
  <text x="125" y="255" text-anchor="middle" fill="#a7f3d0" font-size="10">Case Store</text>
  <text x="125" y="268" text-anchor="middle" fill="#6ee7b7" font-size="8">Zustand state</text>
  <text x="125" y="280" text-anchor="middle" fill="#6ee7b7" font-size="8">IncidentCase</text>
  <rect x="200" y="232" width="110" height="70" rx="6" fill="#065f46" opacity="0.5"/>
  <text x="255" y="255" text-anchor="middle" fill="#a7f3d0" font-size="10">RAG Pipeline</text>
  <text x="255" y="268" text-anchor="middle" fill="#6ee7b7" font-size="8">ingest → embed</text>
  <text x="255" y="280" text-anchor="middle" fill="#6ee7b7" font-size="8">→ search → generate</text>
  <rect x="330" y="232" width="110" height="70" rx="6" fill="#065f46" opacity="0.5"/>
  <text x="385" y="255" text-anchor="middle" fill="#a7f3d0" font-size="10">Assessment</text>
  <text x="385" y="268" text-anchor="middle" fill="#6ee7b7" font-size="8">severity, category</text>
  <text x="385" y="280" text-anchor="middle" fill="#6ee7b7" font-size="8">hazards, timeline</text>
  <rect x="460" y="232" width="110" height="70" rx="6" fill="#065f46" opacity="0.5"/>
  <text x="515" y="255" text-anchor="middle" fill="#a7f3d0" font-size="10">Action Plan</text>
  <text x="515" y="268" text-anchor="middle" fill="#6ee7b7" font-size="8">priorities, steps</text>
  <text x="515" y="280" text-anchor="middle" fill="#6ee7b7" font-size="8">equipment, safety</text>
  <rect x="590" y="232" width="110" height="70" rx="6" fill="#065f46" opacity="0.5"/>
  <text x="645" y="255" text-anchor="middle" fill="#a7f3d0" font-size="10">P2P + Compute</text>
  <text x="645" y="268" text-anchor="middle" fill="#6ee7b7" font-size="8">loopback transfer</text>
  <text x="645" y="280" text-anchor="middle" fill="#6ee7b7" font-size="8">delegate to peer</text>
  <rect x="720" y="232" width="110" height="70" rx="6" fill="#065f46" opacity="0.5"/>
  <text x="775" y="255" text-anchor="middle" fill="#a7f3d0" font-size="10">Export</text>
  <text x="775" y="268" text-anchor="middle" fill="#6ee7b7" font-size="8">report, checklist</text>
  <text x="775" y="280" text-anchor="middle" fill="#6ee7b7" font-size="8">handoff note</text>
  <!-- UI Layer -->
  <rect x="50" y="345" width="800" height="100" rx="8" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="1"/>
  <text x="60" y="365" fill="#fbbf24" font-size="11" font-weight="600">UI LAYER (React + Tailwind)</text>
  <rect x="70" y="378" width="95" height="50" rx="5" fill="#92400e" opacity="0.4"/>
  <text x="117" y="400" text-anchor="middle" fill="#fde68a" font-size="9">Landing</text>
  <rect x="180" y="378" width="95" height="50" rx="5" fill="#92400e" opacity="0.4"/>
  <text x="227" y="400" text-anchor="middle" fill="#fde68a" font-size="9">Intake</text>
  <rect x="290" y="378" width="95" height="50" rx="5" fill="#92400e" opacity="0.4"/>
  <text x="337" y="400" text-anchor="middle" fill="#fde68a" font-size="9">Action Plan</text>
  <rect x="400" y="378" width="95" height="50" rx="5" fill="#92400e" opacity="0.4"/>
  <text x="447" y="400" text-anchor="middle" fill="#fde68a" font-size="9">Ask AI</text>
  <rect x="510" y="378" width="95" height="50" rx="5" fill="#92400e" opacity="0.4"/>
  <text x="557" y="400" text-anchor="middle" fill="#fde68a" font-size="9">Evidence</text>
  <rect x="620" y="378" width="95" height="50" rx="5" fill="#92400e" opacity="0.4"/>
  <text x="667" y="400" text-anchor="middle" fill="#fde68a" font-size="9">P2P</text>
  <rect x="730" y="378" width="95" height="50" rx="5" fill="#92400e" opacity="0.4"/>
  <text x="777" y="400" text-anchor="middle" fill="#fde68a" font-size="9">Export</text>
  <!-- Tauri/Rust Layer -->
  <rect x="50" y="465" width="800" height="55" rx="8" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1"/>
  <text x="60" y="485" fill="#fca5a5" font-size="11" font-weight="600">TAURI + RUST LAYER</text>
  <rect x="70" y="493" width="150" height="20" rx="4" fill="#991b1b" opacity="0.4"/>
  <text x="145" y="507" text-anchor="middle" fill="#fca5a5" font-size="9">Native file system + IPC</text>
  <rect x="240" y="493" width="150" height="20" rx="4" fill="#991b1b" opacity="0.4"/>
  <text x="315" y="507" text-anchor="middle" fill="#fca5a5" font-size="9">System tray + auto-update</text>
  <rect x="410" y="493" width="150" height="20" rx="4" fill="#991b1b" opacity="0.4"/>
  <text x="485" y="507" text-anchor="middle" fill="#fca5a5" font-size="9">Security sandbox</text>
  <rect x="580" y="493" width="150" height="20" rx="4" fill="#991b1b" opacity="0.4"/>
  <text x="655" y="507" text-anchor="middle" fill="#fca5a5" font-size="9">Cross-platform build</text>
  <!-- Data Flow Arrows -->
  <line x1="450" y1="180" x2="450" y2="200" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="325" x2="450" y2="345" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="448" x2="450" y2="465" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Legend -->
  <text x="50" y="555" fill="#64748b" font-size="9">Data flow: UI → Application → QVAC SDK (all local, zero cloud)</text>
  <text x="50" y="570" fill="#64748b" font-size="9">7 QVAC SDK capabilities • 10 screens • 11 data models • 5 knowledge pack documents</text>
</svg>
